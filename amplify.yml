version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
        - rm -f .env.production
        - |
          cat > .env.production << EOF
          NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
          SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
          SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY}
          SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}

          STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
          STRIPE_API_KEY=${STRIPE_API_KEY}
          STRIPE_LIVE_SECRET_KEY=${STRIPE_LIVE_SECRET_KEY}
          STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
          STRIPE_ENDPOINT_SECRET=${STRIPE_ENDPOINT_SECRET}
          STRIPE_WEBHOOK_SIGNING_SECRET=${STRIPE_WEBHOOK_SIGNING_SECRET}

          NEXT_PUBLIC_STRIPE_MONTHLY_PRICE_ID=${NEXT_PUBLIC_STRIPE_MONTHLY_PRICE_ID}
          NEXT_PUBLIC_STRIPE_ANNUAL_PRICE_ID=${NEXT_PUBLIC_STRIPE_ANNUAL_PRICE_ID}
          NEXT_PUBLIC_STRIPE_LIFETIME_PRICE_ID=${NEXT_PUBLIC_STRIPE_LIFETIME_PRICE_ID}
          NEXT_PUBLIC_STRIPE_PREMIUM_PRICE_ID=${NEXT_PUBLIC_STRIPE_PREMIUM_PRICE_ID}
          STRIPE_MONTHLY_PRICE_ID=${STRIPE_MONTHLY_PRICE_ID}
          STRIPE_ANNUAL_PRICE_ID=${STRIPE_ANNUAL_PRICE_ID}
          STRIPE_LIFETIME_PRICE_ID=${STRIPE_LIFETIME_PRICE_ID}

          RESEND_API_KEY=${RESEND_API_KEY}
          RESEND_SECRET_KEY=${RESEND_SECRET_KEY}
          RESEND_TOKEN=${RESEND_TOKEN}
          RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
          FROM_EMAIL=${FROM_EMAIL}
          MAIL_FROM=${MAIL_FROM}

          APP_SESSION_SECRET=${APP_SESSION_SECRET}
          FREE_DEALS_COOKIE_SECRET=${FREE_DEALS_COOKIE_SECRET}
          COOKIE_SECRET=${COOKIE_SECRET}
          SESSION_SECRET=${SESSION_SECRET}
          OUTREACH_QUEUE_SECRET=${OUTREACH_QUEUE_SECRET}

          SENTRY_DSN=${SENTRY_DSN}
          NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN}
          EOF
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
